<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<link rel="manifest" href="/manifest.json">
<!-- iOS: делает сайт полноэкранным без адресной строки Safari, если добавить на главный экран -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="BlackPanda">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
<link rel="icon" type="image/png" sizes="48x48" href="/favicon-48.png">
<link rel="icon" type="image/png" sizes="192x192" href="/favicon-192.png">
<link rel="shortcut icon" href="/favicon.ico">
<!-- Android/Chrome -->
<meta name="theme-color" content="#09090b">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<!-- Заголовок вкладки — слоган, а не название системы, чтобы не светить ссылку/название в чужих глазах (например, на общем экране/проекторе) -->
<title>Технологии, которые работают на ваш успех</title>
<script>
  // Применяем сохранённую тему сразу, до отрисовки React — иначе будет видна вспышка не той темы
  try { if (localStorage.getItem('bp_theme') === 'light') document.documentElement.classList.add('light'); } catch (e) {}
</script>
</head>
<body class="bg-bg text-text">
<div id="root"></div>
<script type="module" src="/src/main.jsx"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<link rel="manifest" href="/manifest.json">
<!-- iOS: делает сайт полноэкранным без адресной строки Safari, если добавить на главный экран -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="BlackPanda">
<link rel="apple-touch-icon" href="/panda-logo-icon.png">
<!-- Android/Chrome -->
<meta name="theme-color" content="#09090b">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<title>BlackPanda CRM</title>
<script>
  // Применяем сохранённую тему сразу, до отрисовки React — иначе будет видна вспышка не той темы
  try { if (localStorage.getItem('bp_theme') === 'light') document.documentElement.classList.add('light'); } catch (e) {}
</script>
</head>
<body class="bg-bg text-text">
<div id="root"></div>
<script type="module" src="/src/main.jsx"></script>
</body>
</html>
